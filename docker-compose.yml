version: '3.8'

services:
  node1:
    build: .
    container_name: node_leader # Nomeado assim para facilitar o teste de "Falha do líder" inicial
    environment:
      - NODE_ID=1
      - CLOCK_DRIFT_MS=120      # Deriva artificial do relógio em ms/s
      - PORT=5000
      - PEERS=node2:5000,node3:5000,node4:5000
    cap_add:
      - NET_ADMIN               # Necessário para usar o comando 'tc' (Atraso artificial)
    networks:
      - dist_network

  node2:
    build: .
    container_name: node2
    environment:
      - NODE_ID=2
      - CLOCK_DRIFT_MS=-80
      - PORT=5000
      - PEERS=node1:5000,node3:5000,node4:5000
    cap_add:
      - NET_ADMIN
    networks:
      - dist_network

  node3:
    build: .
    container_name: node3
    environment:
      - NODE_ID=3
      - CLOCK_DRIFT_MS=50
      - PORT=5000
      - PEERS=node1:5000,node2:5000,node4:5000
    cap_add:
      - NET_ADMIN
    networks:
      - dist_network

  node4:
    build: .
    container_name: node4
    environment:
      - NODE_ID=4
      - CLOCK_DRIFT_MS=-30
      - PORT=5000
      - PEERS=node1:5000,node2:5000,node3:5000
    cap_add:
      - NET_ADMIN
    networks:
      - dist_network

networks:
  dist_network:
    driver: bridge # 1 rede Docker compartilhada